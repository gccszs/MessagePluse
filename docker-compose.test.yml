version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: messagepulse-mysql-1
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: messagepulse_test
      MYSQL_USER: messagepulse
      MYSQL_PASSWORD: messagepulse
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_test_data:/var/lib/mysql
    networks:
      - messagepulse-test

  redis:
    image: redis:7-alpine
    container_name: messagepulse-redis-1
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_test_data:/data
    networks:
      - messagepulse-test

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: messagepulse-zookeeper-1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - messagepulse-test

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: messagepulse-kafka-1
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - messagepulse-test

  messagepulse-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.core
    container_name: messagepulse-core-1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: test,integration-test
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/messagepulse_test?useSSL=false
      SPRING_DATASOURCE_USERNAME: messagepulse
      SPRING_DATASOURCE_PASSWORD: messagepulse
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: true
      MANAGEMENT_HEALTH_PROBES_ENABLED: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - messagepulse-test

volumes:
  mysql_test_data:
  redis_test_data:

networks:
  messagepulse-test:
    driver: bridge
