# MessagePulse Core Test Configuration

spring:
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  kafka:
    bootstrap-servers: ${spring.kafka.bootstrap-server} # Set by testcontainers

# XXL-Job disabled for tests
messagepulse:
  xxl-job:
    enabled: false

  flink:
    enabled: false

# Logging
logging:
  level:
    root: INFO
    com.messagepulse: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: DEBUG
