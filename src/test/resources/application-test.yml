# MessagePulse Core Test Configuration

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Disable Kafka auto-configuration for unit tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379
      password:

# XXL-Job disabled for tests
messagepulse:
  xxl-job:
    enabled: false

  flink:
    enabled: false

  dedup:
    bloom-filter:
      expected-insertions: 1000
      false-probability: 0.01
      window-size-seconds: 60

# Logging
logging:
  level:
    root: INFO
    com.messagepulse: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: DEBUG
