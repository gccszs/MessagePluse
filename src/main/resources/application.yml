# MessagePulse Core Application Configuration

spring:
  application:
    name: messagepulse-core

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database Configuration
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:messagepulse}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:messagepulse_root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

  # Redis Configuration


  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:messagepulse_redis}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
  tomcat:
    threads:
      max: 200
      min-spare: 10

# Management / Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
  prometheus:
    metrics:
      export:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.messagepulse: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{50}] - %msg%n"

# MessagePulse Configuration
messagepulse:
  # Deduplication
  dedup:
    bloom-filter:
      expected-insertions: 1000000
      false-probability: 0.0001
      window-size-seconds: 300

  # Retry Configuration
  retry:
    max-retries: 3
    initial-backoff: 1s
    backoff-multiplier: 2.0
    max-backoff: 60s

  # XXL-Job Configuration
  xxl-job:
    enabled: true
    admin-addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://localhost:8080/xxl-job-admin}
    executor:
      appname: messagepulse-core
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30

  # Rate Limiting
  rate-limit:
    enabled: true

  # Flink (Optional)
  flink:
    enabled: ${FLINK_ENABLED:false}

---
# Profile: test
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:mysql://localhost:3306/messagepulse_test?useSSL=false

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    root: INFO
    com.messagepulse: DEBUG
    org.testcontainers: INFO

---
# Profile: integration-test
spring:
  config:
    activate:
      on-profile: integration-test

  datasource:
    url: jdbc:mysql://${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/messagepulse_test?useSSL=false}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6380
